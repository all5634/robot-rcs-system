spring.application.name=project4
robot.heartbeat.timeout-ms=15000
robot.heartbeat.scan-ms=2000

# management and health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# data client mode: http
robot.data-client.type=http

# external data service config (effective when robot.data-client.type=http)
robot.data-client.http.base-url=http://localhost:8081/api/v1
robot.data-client.http.timeout-ms=2000
robot.data-client.http.retry.max-attempts=3
robot.data-client.http.retry.backoff-ms=200
robot.data-client.http.circuit.failure-threshold=5
robot.data-client.http.circuit.open-ms=10000
robot.data-client.http.paths.save-robot=/robots
robot.data-client.http.paths.save-heartbeat=/robots/heartbeat
robot.data-client.http.paths.save-status=/robots/status
robot.data-client.http.paths.save-command=/robots/commands
robot.data-client.http.paths.update-command-status=/robots/commands/status

# command idempotency window
robot.command.idempotency.window-ms=5000

# command async executor
robot.command.executor.core-pool-size=2
robot.command.executor.max-pool-size=8
robot.command.executor.queue-capacity=200
robot.command.executor.keep-alive-seconds=60

# seed robot for frontend verification
robot.seed.enabled=true
robot.seed.robot-code=RBT-DEMO-001
robot.seed.model=MEC-DEMO
robot.seed.capabilities=move,lift,scan

# cors (comma-separated origins), use * for all in local debugging
robot.cors.allowed-origins=*
