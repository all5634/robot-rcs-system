server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/robot_scheduler?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: psy666
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

scheduler:
  priority:
    weight:
      base: 1.0
      waiting: 1.0
      deadline: 1.0
      type: 1.0
      robot: 1.0
    recalculation-interval-ms: 30000

llm:
  websocket:
    url: ws://localhost:8090/ws/llm
    timeout-ms: 5000

rosbridge:
  websocket:
    url: ws://localhost:9090
  topics:
    map: /map
    pose: /amcl_pose
    goal: /goal_pose
  default-robot-code: ""

data-service:
  url: http://localhost:8000
  connect-timeout-ms: 3000
  read-timeout-ms: 5000
  retry:
    max-attempts: 3
    backoff-multiplier: 1000